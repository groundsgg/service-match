version: v2beta1
name: service-match

deployments:
  app:
    namespace: api
    helm:
      releaseName: service-match
      chart:
        name: oci://ghcr.io/groundsgg/charts/grounds-service
        version: 0.1.0
      values:
        deployment:
          image:
            repository: ghcr.io/groundsgg/service-match
            tag: edge
          containerPort: 9000
          env:
            - name: POSTGRES_URL
              value: jdbc:postgresql://postgresql.databases:5432/app?currentSchema=match
        service:
          enabled: true
          port: 9000
          targetPort: 9000

dev:
  app:
    imageSelector: ghcr.io/groundsgg/service-match
    devImage: gradle:9.2.1-jdk25
    sync:
      - path: ./
        excludePaths:
          - .gradle/
          - build/
      - path: ${HOME}/.gradle/gradle.properties:/tmp/gradle-user-home/gradle.properties
        file: true
    terminal:
      command: |
        export QUARKUS_ANALYTICS_DISABLED=true
        export GRADLE_USER_HOME=/tmp/gradle-user-home
        ./gradlew --console=plain quarkusDev
    ports:
      - port: "9000"
