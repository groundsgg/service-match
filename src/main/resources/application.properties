quarkus.grpc.server.use-separate-server=false
quarkus.http.host=0.0.0.0
quarkus.http.port=9000
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}

quarkus.generate-code.grpc.scan-for-proto=gg.grounds:library-grpc-contracts-match

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/app?currentSchema=match}
quarkus.datasource.username=${POSTGRES_USER:app}
quarkus.datasource.password=${POSTGRES_PASSWORD:app}
quarkus.flyway.schemas=match
quarkus.flyway.migrate-at-start=true
quarkus.flyway.create-schemas=true

# Weng-Lin (OpenSkill) rating defaults. sigma = mu/3 is the OpenSkill
# convention for "no information yet"; the display rating is the
# conservative mu - 3*sigma, so a fresh player shows 0 and climbs as
# the model gets certain about them.
grounds.match.rating.default-mu=${MATCH_RATING_DEFAULT_MU:25.0}
grounds.match.rating.default-sigma=${MATCH_RATING_DEFAULT_SIGMA:8.333333333333334}

# Valkey — the queue spine. Tickets, queues, the one-live-ticket guard, the
# in-flight match journal and the allocation stream all live here, and the Lua
# scripts Valkey serialises are what make the matchmaker correct.
quarkus.redis.hosts=${VALKEY_URL:redis://localhost:6379}

# Queue tick. The band widens with waiting time, so the matcher must be
# timer-driven — an event-driven loop could never widen a band.
grounds.match.tick=${MATCH_TICK:2s}

# TTLs are garbage collection, not liveness: a ticket is finished when its state
# says so, not when it expires.
grounds.match.ticket.ttl-seconds=${MATCH_TICKET_TTL:21600}
grounds.match.match.ttl-seconds=${MATCH_MATCH_TTL:86400}

# Allocation. Agones runs in this same cluster, so the allocator talks to the
# local apiserver with the pod's own ServiceAccount.
grounds.match.agones.namespace=${AGONES_NAMESPACE:default}

# How to reach an allocated server. Our fleets run portPolicy: None, so Agones
# does no port management for them: status.ports is empty and status.address is
# the NODE's. The pod is what we must reach, and its address is the PodIP entry
# in status.addresses — the very entry plugin-agones registers proxy backends
# by, so the matchmaker and the proxy agree on what "the server" means. The port
# is fixed for the same reason: there is no allocated port to read.
grounds.match.agones.address-type=${AGONES_ADDRESS_TYPE:PodIP}
grounds.match.agones.port=${AGONES_PORT:25565}

# Where the game server listens for the match push (MatchHost/StartMatch).
# Its Minecraft port is 25565; this is a second port on the same pod, dialled
# on the pod IP inside the project's own vCluster. The deadline is short on
# purpose: this call sits between "match formed" and "players routed", and a
# server that cannot answer promptly is one the players should not be sent to.
grounds.match.gameserver.grpc-port=${GAMESERVER_GRPC_PORT:9090}
grounds.match.gameserver.deadline-ms=${GAMESERVER_DEADLINE_MS:5000}

grounds.match.alloc.poll=${ALLOC_POLL:1s}

# Fences concurrent allocation attempts for one match. It does NOT make
# allocation idempotent — nothing can, GameServerAllocation is a
# non-idempotent create — it only stops two workers POSTing at the same moment.
grounds.match.alloc.lease-ms=${ALLOC_LEASE_MS:30000}
grounds.match.alloc.max-attempts=${ALLOC_MAX_ATTEMPTS:3}

# How long a pending stream entry may idle before another worker takes it over.
# This is the dead-replica takeover, and it runs continuously rather than only
# at boot.
grounds.match.alloc.idle-reclaim-ms=${ALLOC_IDLE_RECLAIM_MS:60000}

# A Minestom server hosts many matches at once, so there is no GameServer reaper:
# deleting "the orphan's server" would throw every other game on it out mid-fight.
# What is left is narrower — a match that was claimed but whose server never took
# it. Those players are put back on the queue.
grounds.match.watchdog.every=${WATCHDOG_EVERY:30s}
grounds.match.watchdog.stale-after-ms=${WATCHDOG_STALE_AFTER_MS:120000}

# JWT validation — verifies every incoming gRPC call's Bearer token
# against the k8s API-server's JWKS endpoint. Audience binds the
# token to this service class.
#
# In-cluster: kubernetes.default.svc resolves correctly. Disable
# (set grounds.auth.enabled=false) for local dev where there's no
# projected SA-Token volume to attach.
grounds.auth.enabled=${GROUNDS_AUTH_ENABLED:true}
grounds.auth.jwks-url=${GROUNDS_AUTH_JWKS_URL:https://kubernetes.default.svc/openid/v1/jwks}
grounds.auth.expected-audience=${GROUNDS_AUTH_AUDIENCE:grounds-services}
grounds.auth.k8s-ca-file=${GROUNDS_AUTH_K8S_CA_FILE:/var/run/secrets/kubernetes.io/serviceaccount/ca.crt}
grounds.auth.k8s-token-file=${GROUNDS_AUTH_K8S_TOKEN_FILE:/var/run/secrets/kubernetes.io/serviceaccount/token}

# OpenTelemetry — emits a span per incoming gRPC call to Alloy, which
# forwards to Tempo (visible in Grafana at grafana.platform.grnds.io).
# Disabled by default in local dev because there's no Alloy to talk to;
# the cluster-deployed Helm chart sets OTEL_SDK_DISABLED=false.
quarkus.application.name=service-match
quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:true}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://alloy.observability.svc.cluster.local:4317}
