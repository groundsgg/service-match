quarkus.grpc.server.use-separate-server=false
quarkus.http.host=0.0.0.0
quarkus.http.port=9000
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}

quarkus.generate-code.grpc.scan-for-proto=gg.grounds:library-grpc-contracts-match

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/app?currentSchema=match}
quarkus.datasource.username=${POSTGRES_USER:app}
quarkus.datasource.password=${POSTGRES_PASSWORD:app}
quarkus.flyway.schemas=match
quarkus.flyway.migrate-at-start=true
quarkus.flyway.create-schemas=true

# Weng-Lin (OpenSkill) rating defaults. sigma = mu/3 is the OpenSkill
# convention for "no information yet"; the display rating is the
# conservative mu - 3*sigma, so a fresh player shows 0 and climbs as
# the model gets certain about them.
grounds.match.rating.default-mu=${MATCH_RATING_DEFAULT_MU:25.0}
grounds.match.rating.default-sigma=${MATCH_RATING_DEFAULT_SIGMA:8.333333333333334}

# JWT validation — verifies every incoming gRPC call's Bearer token
# against the k8s API-server's JWKS endpoint. Audience binds the
# token to this service class.
#
# In-cluster: kubernetes.default.svc resolves correctly. Disable
# (set grounds.auth.enabled=false) for local dev where there's no
# projected SA-Token volume to attach.
grounds.auth.enabled=${GROUNDS_AUTH_ENABLED:true}
grounds.auth.jwks-url=${GROUNDS_AUTH_JWKS_URL:https://kubernetes.default.svc/openid/v1/jwks}
grounds.auth.expected-audience=${GROUNDS_AUTH_AUDIENCE:grounds-services}
grounds.auth.k8s-ca-file=${GROUNDS_AUTH_K8S_CA_FILE:/var/run/secrets/kubernetes.io/serviceaccount/ca.crt}
grounds.auth.k8s-token-file=${GROUNDS_AUTH_K8S_TOKEN_FILE:/var/run/secrets/kubernetes.io/serviceaccount/token}

# OpenTelemetry — emits a span per incoming gRPC call to Alloy, which
# forwards to Tempo (visible in Grafana at grafana.platform.grnds.io).
# Disabled by default in local dev because there's no Alloy to talk to;
# the cluster-deployed Helm chart sets OTEL_SDK_DISABLED=false.
quarkus.application.name=service-match
quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:true}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://alloy.observability.svc.cluster.local:4317}
